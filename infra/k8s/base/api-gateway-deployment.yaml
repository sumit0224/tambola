apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: ghcr.io/example/tambola-api-gateway:latest
          ports:
            - containerPort: 3010
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: tambola-secrets
                  key: database-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: tambola-secrets
                  key: redis-url
            - name: KAFKA_BROKERS
              value: kafka:9092
            - name: JWT_ACCESS_SECRET
              valueFrom:
                secretKeyRef:
                  name: tambola-secrets
                  key: jwt-access-secret
            - name: JWT_REFRESH_SECRET
              valueFrom:
                secretKeyRef:
                  name: tambola-secrets
                  key: jwt-refresh-secret
            - name: FF_NEW_AUTH
              value: "1"
          readinessProbe:
            httpGet:
              path: /readyz
              port: 3010
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 3010
            initialDelaySeconds: 10
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
spec:
  selector:
    app: api-gateway
  ports:
    - port: 3010
      targetPort: 3010
