apiVersion: apps/v1
kind: Deployment
metadata:
  name: realtime-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: realtime-gateway
  template:
    metadata:
      labels:
        app: realtime-gateway
    spec:
      containers:
        - name: realtime-gateway
          image: ghcr.io/example/tambola-realtime-gateway:latest
          ports:
            - containerPort: 3020
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: tambola-secrets
                  key: database-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: tambola-secrets
                  key: redis-url
            - name: KAFKA_BROKERS
              value: kafka:9092
            - name: JWT_ACCESS_SECRET
              valueFrom:
                secretKeyRef:
                  name: tambola-secrets
                  key: jwt-access-secret
            - name: JWT_REFRESH_SECRET
              valueFrom:
                secretKeyRef:
                  name: tambola-secrets
                  key: jwt-refresh-secret
            - name: FF_KAFKA_EVENTS
              value: "1"
          readinessProbe:
            httpGet:
              path: /readyz
              port: 3020
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 3020
            initialDelaySeconds: 10
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: realtime-gateway
spec:
  selector:
    app: realtime-gateway
  ports:
    - port: 3020
      targetPort: 3020
