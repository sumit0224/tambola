apiVersion: apps/v1
kind: Deployment
metadata:
  name: game-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: game-service
  template:
    metadata:
      labels:
        app: game-service
    spec:
      containers:
        - name: game-service
          image: ghcr.io/example/tambola-game-service:latest
          ports:
            - containerPort: 3003
          env:
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: tambola-secrets
                  key: redis-url
---
apiVersion: v1
kind: Service
metadata:
  name: game-service
spec:
  selector:
    app: game-service
  ports:
    - port: 3003
      targetPort: 3003
